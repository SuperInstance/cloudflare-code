# Cocapn Hybrid IDE - Cloudflare Workers Configuration
name = "cocapn-ide"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for Authentication
[[kv_namespaces]]
binding = "KV_AUTH_NAMESPACE"
id = "your-kv-namespace-id"
preview_id = ""

# Development environment
[env.development]
name = "cocapn-ide-dev"
vars = { ENVIRONMENT = "development", DEBUG = "true" }

# Staging environment
[env.staging]
name = "cocapn-ide-staging"
route = { pattern = "cocapn-ide-staging.workers.dev", zone_name = "workers.dev" }
vars = { ENVIRONMENT = "staging", DEBUG = "false" }

# Production environment
[env.production]
name = "cocapn-ide"
vars = { ENVIRONMENT = "production", DEBUG = "false" }
routes = [
  { pattern = "cocapn-ide.workers.dev/*", zone_name = "workers.dev" }
]

# Rate limiting
[env.production.ratelimit]
zone = "cocapn-ide"
requests_per_minute = 100

# Security headers
[env.production.headers]
"Content-Security-Policy" = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
"X-Content-Type-Options" = "nosniff"
"X-Frame-Options" = "DENY"
"X-XSS-Protection" = "1; mode=block"
"Referrer-Policy" = "strict-origin-when-cross-origin"

[env.development.headers]
"Content-Security-Policy" = "default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
"X-Content-Type-Options" = "nosniff"

[env.staging.headers]
"Content-Security-Policy" = "default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.workers.dev;"
"X-Content-Type-Options" = "nosniff"