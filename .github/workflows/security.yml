name: Security Scanning

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of security scan'
        required: false
        type: choice
        options:
          - all
          - dependencies
          - code
          - secrets
          - containers

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Dependency Vulnerability Scanning
  # ============================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate --json > npm-audit-report.json
        continue-on-error: true

      - name: Run Snyk dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: 'claudeflare'
          path: '.'
          format: 'JSON'
          out: 'dependency-check-reports'

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports
          path: |
            npm-audit-report.json
            snyk-report.json
            dependency-check-reports/
          retention-days: 30

  # ============================================
  # Static Application Security Testing (SAST)
  # ============================================
  sast-scan:
    name: Static Code Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: javascript
          queries: security-extended,security-and-quality

      - name: Run Semgrep security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          severity: ERROR
          json: true

      - name: Run ESLint security rules
        run: |
          npx eslint 'src/**/*.ts' \
            --plugin 'security' \
            --config '.eslintrc.security.json' \
            --format json \
            --output-file eslint-security-report.json
        continue-on-error: true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-security-reports
          path: |
            eslint-security-report.json
            semgrep-report.json
          retention-days: 30

  # ============================================
  # Secrets Scanning
  # ============================================
  secrets-scan:
    name: Secrets Detection Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Scan for hardcoded secrets
        run: |
          npx secret-scan \
            --path ./src \
            --output secret-scan-report.json \
            --format json
        continue-on-error: true

      - name: Upload secrets scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-reports
          path: |
            secret-scan-report.json
            gitleaks-report.json
          retention-days: 30

  # ============================================
  # Infrastructure as Code Security
  # ============================================
  iac-scan:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          framework: cloudformation
          output_format: json
          output_file_path: checkov-report.json
          soft_fail: true

      - name: Scan Terraform configurations
        run: |
          npx tfsec .
          --format json \
          --out tfsec-report.json
        continue-on-error: true

      - name: Scan Kubernetes manifests
        run: |
          npx kube-score score \
            --output-format json \
            --output-file kube-score-report.json \
            k8s/
        continue-on-error: true

      - name: Upload IaC security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-security-reports
          path: |
            checkov-report.json
            tfsec-report.json
            kube-score-report.json
          retention-days: 30

  # ============================================
  # Container Security Scanning
  # ============================================
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'containers'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -t claudeflare:test .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'claudeflare:test'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'

      - name: Run Grype security scanner
        uses: anchore/scan-action@v3
        with:
          image: 'claudeflare:test'
          format: 'json'
          output: 'grype-report.json'

      - name: Upload container scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-security-reports
          path: |
            trivy-report.json
            grype-report.json
          retention-days: 30

  # ============================================
  # Security Policy Compliance
  # ============================================
  compliance-check:
    name: Security Policy Compliance
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secrets-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all security reports
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: Aggregate security findings
        run: |
          node scripts/aggregate-security-findings.js \
            --input-dir security-reports/ \
            --output security-summary.json

      - name: Check security thresholds
        run: |
          node scripts/check-security-thresholds.js \
            --report security-summary.json \
            --max-critical 0 \
            --max-high 5 \
            --max-medium 20

      - name: Generate security summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total vulnerabilities found: $(cat security-summary.json | jq '.total')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Severity Breakdown" >> $GITHUB_STEP_SUMMARY
          cat security-summary.json | jq -r '.breakdown | to_entries[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY

      - name: Create security issue if critical findings
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security scan found critical vulnerabilities',
              body: 'Automated security scan detected critical vulnerabilities. Please review the security reports.',
              labels: ['security', 'high-priority']
            })

  # ============================================
  # Security Metrics Dashboard
  # ============================================
  security-metrics:
    name: Security Metrics
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secrets-scan, compliance-check]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download security reports
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: Generate security metrics
        run: |
          echo "## Security Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Date | $(date -u +%Y-%m-%d) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Scan | ${{ needs.sast-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance Check | ${{ needs.compliance-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload metrics to CodeQL
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-reports/sast-security-reports/
