name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production
      rollback:
        description: 'Rollback to previous version'
        required: false
        type: boolean
        default: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.claudeflare.workers.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Workers bundle
        run: npm run build
        env:
          NODE_ENV: staging

      - name: Setup Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run smoke tests
        run: npm run test:smoke -- --env=staging
        env:
          STAGING_URL: https://staging.claudeflare.workers.dev

      - name: Verify deployment
        run: npm run verify:deployment -- --env=staging

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://claudeflare.workers.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Workers bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Backup current deployment
        run: npm run backup:deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Production)
        id: deploy
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run smoke tests
        run: npm run test:smoke -- --env=production
        env:
          PRODUCTION_URL: https://claudeflare.workers.dev

      - name: Verify deployment
        run: npm run verify:deployment -- --env=production

      - name: Health check
        run: |
          npx tsx scripts/health-check.ts \
            --environment production \
            --duration 60 \
            --threshold 99 \
            --output health-check-report.json

      - name: Upload health check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-report
          path: health-check-report.json
          retention-days: 30

      - name: Collect deployment metrics
        if: success()
        run: |
          DEPLOYMENT_START_TIME=$(date +%s000)
          DEPLOYMENT_END_TIME=$(date +%s000)
          npx tsx scripts/deployment-metrics.ts collect \
            --environment production \
            --version ${{ github.sha }} \
            --strategy full \
            --deployment-id deployment-${{ github.run_number }}

      - name: Rollback on failure
        if: failure()
        run: |
          npx tsx scripts/rollback-standalone.ts \
            --environment production \
            --strategy immediate \
            --reason "Deployment failed health checks"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: |
            Production deployment successful
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  rollback:
    name: Rollback Deployment
    if: github.event.inputs.rollback == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rollback deployment
        run: |
          npx tsx scripts/rollback-standalone.ts \
            --environment ${{ github.event.inputs.environment }} \
            --strategy immediate \
            --reason "Manual rollback requested"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify rollback
        run: npm run verify:deployment -- --env=${{ github.event.inputs.environment }}

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: 'success'
          text: 'Rollback to ${{ github.event.inputs.environment }} completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  post-deploy-monitoring:
    name: Post-Deployment Monitoring
    if: success()
    runs-on: ubuntu-latest
    needs: [deploy-production]

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Run monitoring checks
        run: |
          echo "Checking production endpoints..."
          curl -f https://claudeflare.workers.dev/health || exit 1
          curl -f https://claudeflare.workers.dev/metrics || exit 1

      - name: Record deployment metrics
        run: |
          echo "Deployment timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deployment-metrics.txt
          echo "Commit SHA: ${{ github.sha }}" >> deployment-metrics.txt
          echo "Environment: production" >> deployment-metrics.txt

      - name: Upload deployment metrics
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metrics
          path: deployment-metrics.txt
          retention-days: 90
