name: Build Validation

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build and Analyze Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Workers bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check bundle size
        run: npm run check-bundle-size
        env:
          BUNDLE_SIZE_LIMIT: 3072000  # 3MB in bytes

      - name: Analyze bundle composition
        run: npm run analyze-bundle

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle
          path: dist/
          retention-days: 7

      - name: Generate build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle Size**: $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  bundle-size-limit:
    name: Enforce Bundle Size Limit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: worker-bundle
          path: dist/

      - name: Check bundle size limit
        run: |
          BUNDLE_SIZE=$(du -sb dist/ | cut -f1)
          LIMIT=3072000  # 3MB in bytes
          SIZE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1024 / 1024" | bc)
          LIMIT_MB=$(echo "scale=2; $LIMIT / 1024 / 1024" | bc)

          echo "Bundle size: ${SIZE_MB}MB"
          echo "Size limit: ${LIMIT_MB}MB"

          if [ $BUNDLE_SIZE -gt $LIMIT ]; then
            echo "❌ Bundle size exceeds 3MB limit!"
            echo "Current: ${SIZE_MB}MB, Limit: ${LIMIT_MB}MB"
            exit 1
          else
            echo "✅ Bundle size within limits"
            PERCENT=$(echo "scale=1; $BUNDLE_SIZE * 100 / $LIMIT" | bc)
            echo "Usage: ${PERCENT}% of limit"
          fi

  build-matrix:
    name: Build for Multiple Environments
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging, production]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ matrix.environment }}
        run: npm run build -- --env=${{ matrix.environment }}
        env:
          NODE_ENV: ${{ matrix.environment }}

      - name: Upload environment-specific bundle
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle-${{ matrix.environment }}
          path: dist/
          retention-days: 7
