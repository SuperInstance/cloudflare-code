# ClaudeFlare Cloudflare Workers Configuration
# Environment variables: staging, production

name = "claudeflare"
main = "dist/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Account settings
account_id = "049ff5e84ecf636b53b162cbb580aae6"
workers_dev = true

# Build configuration
[build]
command = "npm run build"
cwd = "."

# Development environment
[env.development]
name = "claudeflare-dev"
vars = { ENVIRONMENT = "development" }

# KV Namespaces (development)
[[env.development.kv_namespaces]]
binding = "CACHE_KV"
id = "989755f5de814d7db8966d2c763891a6"
preview_id = ""

# D1 Databases (development)
[[env.development.d1_databases]]
binding = "DB"
database_name = "claudeflare-dev-db"
database_id = "52c33cef-6768-4646-b509-b607b66304ea"

# R2 Buckets (development)
[[env.development.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "claudeflare-dev-storage"

# Durable Objects (development)
[[env.development.durable_objects.bindings]]
name = "AGENT_ORCHESTRATOR"
class_name = "AgentOrchestrator"

[[env.development.durable_objects.bindings]]
name = "VECTOR_INDEX"
class_name = "VectorIndex"

# Staging environment
[env.staging]
name = "claudeflare-staging"
route = { pattern = "staging.claudeflare.workers.dev", zone_name = "workers.dev" }

[env.staging.vars]
ENVIRONMENT = "staging"
# API Endpoints
API_ENDPOINT = "https://staging-api.claudeflare.workers.dev"
GRAPHQL_ENDPOINT = "https://staging-graphql.claudeflare.workers.dev"

# Feature flags
ENABLE_CACHE = "true"
ENABLE_ANALYTICS = "true"
ENABLE_RATE_LIMITING = "true"
LOG_LEVEL = "debug"

# Provider configuration
PROVIDER_ROUTING_STRATEGY = "round-robin"
MAX_CONCURRENT_REQUESTS = "100"

# KV Namespaces (staging)
[[env.staging.kv_namespaces]]
binding = "CACHE_KV"
id = ""  # Set via CLOUDFLARE KV namespace ID
preview_id = ""

# Durable Objects (staging)
[[env.staging.durable_objects.bindings]]
name = "AGENT_ORCHESTRATOR"
class_name = "AgentOrchestrator"

[[env.staging.durable_objects.bindings]]
name = "VECTOR_INDEX"
class_name = "VectorIndex"

# R2 Buckets (staging)
[[env.staging.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "claudeflare-staging-storage"

# D1 Databases (staging)
[[env.staging.d1_databases]]
binding = "DB"
database_name = "claudeflare-staging-db"
database_id = ""  # Set via CLOUDFLARE D1 database ID

# Queues (staging)
[[env.staging.queues.producers]]
binding = "TASK_QUEUE"
queue = "claudeflare-staging-tasks"

[[env.staging.queues.consumers]]
queue = "claudeflare-staging-tasks"
max_batch_size = 10
max_wait_time = 5

# Production environment
[env.production]
name = "claudeflare"
# Custom domains for cocapn
routes = [
  { pattern = "cocapn.com/*", zone_name = "cocapn.com" },
  { pattern = "cocapn.ai/*", zone_name = "cocapn.ai" }
]

[env.production.vars]
ENVIRONMENT = "production"
# Domain configuration
PRIMARY_DOMAIN = "cocapn.com"
AI_DOMAIN = "cocapn.ai"
# API Endpoints
API_ENDPOINT = "https://api.cocapn.com"
GRAPHQL_ENDPOINT = "https://api.cocapn.com"

# Feature flags
ENABLE_CACHE = "true"
ENABLE_ANALYTICS = "true"
ENABLE_RATE_LIMITING = "true"
LOG_LEVEL = "info"

# Provider configuration
PROVIDER_ROUTING_STRATEGY = "least-latency"
MAX_CONCURRENT_REQUESTS = "1000"

# KV Namespaces (production)
[[env.production.kv_namespaces]]
binding = "CACHE_KV"
id = "0e44edbf77c94a2a8d5c5c0163481661"
preview_id = ""

# Durable Objects (production)
[[env.production.durable_objects.bindings]]
name = "AGENT_ORCHESTRATOR"
class_name = "AgentOrchestrator"

[[env.production.durable_objects.bindings]]
name = "VECTOR_INDEX"
class_name = "VectorIndex"

# R2 Buckets (production)
[[env.production.r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "cocapn-storage"

# D1 Databases (production)
[[env.production.d1_databases]]
binding = "DB"
database_name = "cocapn-db"
database_id = "65d5dc9a-5084-4416-bdd8-0841f066d738"

# Queues (production)
# Note: Queues require a Workers Paid plan
# Uncomment when ready to upgrade:
# [[env.production.queues.producers]]
# binding = "TASK_QUEUE"
# queue = "claudeflare-production-tasks"
#
# [[env.production.queues.consumers]]
# queue = "claudeflare-production-tasks"
# max_batch_size = 25
# max_wait_time = 10

# Analytics will be enabled after deployment

# Durable Objects migrations (for free plan)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentOrchestrator", "VectorIndex"]
